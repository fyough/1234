name: VOD Update Cycle

on:
  schedule:
    - cron: '0 0 * * *'     # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # Slightly newer recommended

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Execute movie.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}   # ← Fixed
        run: |
          echo "Starting VOD update..."
          cd scraper-logic || exit 1
          python movie.py
          echo "VOD update completed."

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add scraper-logic/vod/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update VOD playlist and cache [$(date +'%Y-%m-%d')]"
            git push
            echo "Changes committed and pushed."
          fi
